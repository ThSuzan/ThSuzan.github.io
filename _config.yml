# ─────────────────────────────────────────
#  Jekyll – configuration GitHub Pages
#  Thomas Suzan · thsuzan.github.io
# ─────────────────────────────────────────

# Identité du site
title:       "Thomas Suzan"
description: "Docteur en Mathématiques & Informatique · Université Grenoble-Alpes. Recherches en reconfiguration, homomorphismes de graphes orientés et complexité algorithmique."
url:         "https://thsuzan.github.io"
baseurl:     ""
lang:        "fr"

# Auteur
author:
  name:  "Thomas Suzan"
  email: ""          # laissé vide intentionnellement

# Thème – on n'utilise pas de thème Jekyll,
# la page est un HTML statique autonome
theme: null

# Plugins autorisés sur GitHub Pages
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Sitemap (jekyll-sitemap)
# Le plugin génère /sitemap.xml automatiquement.
# Exclure les fichiers non-pages du sitemap :
defaults:
  - scope:
      path: ""
    values:
      sitemap: true

# Ne pas traiter ces dossiers/fichiers
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - "*.sh"

# Encodage
encoding: utf-8

# Pas de pagination, pas de collections
paginate: null
